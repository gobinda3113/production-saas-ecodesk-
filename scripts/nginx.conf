server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.ingest.sentry.io https://plausible.io https://*.cloudflare.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Static assets with immutable cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Landing page
    location = / {
        try_files /index.html =404;
    }

    # Auth pages (exact matches)
    location = /login {
        try_files /login.html =404;
    }
    location = /forgot-password {
        try_files /forgot-password.html =404;
    }
    location = /reset-password {
        try_files /reset-password.html =404;
    }

    # Static pages (exact matches)
    location = /privacy {
        try_files /privacy.html =404;
    }
    location = /terms {
        try_files /terms.html =404;
    }
    location = /help {
        try_files /help.html =404;
    }

    # Client dashboard shell (exact matches for client-side sub-routing)
    location = /dashboard {
        try_files /dashboard.html =404;
    }
    location = /keywords {
        try_files /dashboard.html =404;
    }
    location = /connections {
        try_files /dashboard.html =404;
    }
    location = /billing {
        try_files /dashboard.html =404;
    }
    location = /settings {
        try_files /dashboard.html =404;
    }

    # Admin pages — exact matches MUST come before prefix match
    location = /admin/login {
        try_files /admin-login.html =404;
    }
    location = /admin/clients {
        try_files /admin.html =404;
    }
    location = /admin/payments {
        try_files /admin.html =404;
    }
    location = /admin/webhooks {
        try_files /admin.html =404;
    }
    location = /admin/system {
        try_files /admin.html =404;
    }
    location = /admin {
        try_files /admin.html =404;
    }

    # API proxy
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback to 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
